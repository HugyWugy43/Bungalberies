version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: bungalberies-db
    environment:
      POSTGRES_DB: shopdb
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME:-shopuser}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-shopsecret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPRING_DATASOURCE_USERNAME:-shopuser} -d shopdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: bungalberies-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://db:5432/shopdb}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-shopuser}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-shopsecret}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      APP_JWTSECRET: ${APP_JWTSECRET:-ReplaceThisWithAStrongSecretKeyChangeMeReplaceThisWithLongKey}
      APP_JWT_EXPIRATION_MS: ${APP_JWT_EXPIRATION_MS:-86400000}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: bungalberies-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
