spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/shopdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:shopuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:shopsecret}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Jackson
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false

# JWT
app.jwtSecret=${APP_JWTSECRET:ReplaceThisWithAStrongSecretKeyChangeMeReplaceThisWithLongKey}
app.jwtExpirationMs=${APP_JWT_EXPIRATION_MS:86400000}

server.port=8080

# Admin
app.adminPassword=${ADMIN_PASSWORD:admin123}

# Mail
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
